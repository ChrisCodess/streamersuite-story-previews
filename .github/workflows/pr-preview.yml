name: Storybook PR Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: storybook-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

env:
  STAGE: pr-${{ github.event.pull_request.number }}

jobs:
  deploy:
    if: ${{ github.event.action != 'closed' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build Storybook
        run: bun run storybook:build

      - name: Detect changed stories
        run: bun run changed-stories
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}

      - name: Resolve preview password
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          existing_password="$(
            gh api "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --jq '[.[] | select(.user.login == "github-actions[bot]") | select((.body | contains("<!-- storybook-preview-comment -->")) or (.body | contains("## Storybook Preview"))) | .body] | last // ""' \
              | sed -n 's/.*Password[^`]*`\([^`]*\)`.*/\1/p' \
              | tail -n 1
          )"

          if [[ -n "${existing_password}" ]]; then
            echo "::add-mask::${existing_password}"
            echo "STORYBOOK_PASSWORD=${existing_password}" >> "$GITHUB_ENV"
            exit 0
          fi

          preview_password="$(openssl rand -hex 24)"
          echo "::add-mask::${preview_password}"
          echo "STORYBOOK_PASSWORD=${preview_password}" >> "$GITHUB_ENV"

      - name: Deploy PR Storybook
        run: bun alchemy deploy --stage ${{ env.STAGE }} --yes
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST: ${{ github.event.pull_request.number }}

  cleanup:
    if: ${{ github.event.action == 'closed' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Safety check
        run: |
          if [[ "${STAGE}" != pr-* ]]; then
            echo "Refusing to destroy non-PR stage: ${STAGE}"
            exit 1
          fi

      - name: Destroy PR Storybook
        run: bun alchemy destroy --stage ${{ env.STAGE }} --yes
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST: ${{ github.event.pull_request.number }}
          STORYBOOK_PASSWORD: unused
